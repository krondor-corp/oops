<nav class="sidebar" aria-label="Documentation navigation">
  {% for group in site.data.nav %}
  <div class="sidebar-group">
    <h3 class="sidebar-heading">{{ group.title }}</h3>
    <ul class="sidebar-list">
      {% for slug in group.items %}
        {% assign doc = site.docs | where: "slug", slug | first %}
        {% if doc %}
        <li class="sidebar-item{% if page.url == doc.url %} active{% endif %}">
          <a href="{{ doc.url | relative_url }}">{{ doc.title }}</a>
        </li>
        {% endif %}
      {% endfor %}
    </ul>
  </div>
  {% endfor %}
</nav>
